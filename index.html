<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Interactive visual simulations of every major time series ML model — from classical statistics to modern foundation models. Learn by doing." />
    <title>Time Series ML Models — Interactive Visual Simulator</title>
    <script type="text/javascript">
      // handle redirection for SPAs on GitHub Pages
      (function(l) {
        if (l.search.indexOf('redirect=') !== -1) {
          var decoded = l.search.slice(1).split('&').map(function(s) { 
            return s.replace(/~and~/g, '&') 
          }).filter(function(s) {
            return s.slice(0, 9) === 'redirect='
          })[0].slice(9);
          if (decoded !== l.pathname) {
            window.history.replaceState(null, null, l.pathname.slice(0, -1) + decoded + l.hash);
          }
        }
      }(window.location))
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
