<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Time Series ML Models</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // This script checks to see if a redirect is present in the query string
      // and converts it back into the correct url and adds it to the
      // browser's history using window.history.replaceState(...),
      // which will cause the browser to load the correct content for the path.
      var p = window.location.pathname;
      if (p.charAt(p.length - 1) !== '/') p += '/';
      window.location.replace(p + '?redirect=' + window.location.pathname.slice(p.length).replace(/&/g, '~and~') + window.location.search);
    </script>
  </head>

  </body>
</html>
